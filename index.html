<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>L20412 Projects</title>

<style>
body { margin:0; font-family:Arial; background:#212121; }
header { background: #ff4c4c; color:white; padding:15px 25px; font-weight:bold; }

.section { padding:20px; }
h2 { margin-bottom:10px; }

.scroll-container {
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding-bottom:10px;
}

.card {
    min-width:220px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    flex-shrink:0;
}

.thumbnail {
    width:100%;
    height:140px;
    object-fit:cover;
    background:#ddd;
}

.card-content { padding:10px; }

.card a {
    text-decoration:none;
    color:#4d97ff;
    font-weight:bold;
}

.coming {
    min-width:220px;
    background:#eee;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#777;
    font-style:italic;
}
</style>
</head>

<body>

<header>L20412's TurboWarp and Penguinmod Projects</header>

<div class="section">
<h2>📌 Pinned</h2>
<div id="pinned" class="scroll-container"></div>
</div>

<div class="section">
<h2>TurboWarp Projects</h2>
<div id="turbowarp" class="scroll-container"></div>
</div>

<div class="section">
<h2>Penguinmod Projects</h2>
<div id="penguinmod" class="scroll-container"></div>
</div>

<script>
function createCard(project) {
    return `
        <div class="card">
            <img class="thumbnail" src="${project.thumbnail || ''}">
            <div class="card-content">
                <a href="${project.link}" target="_blank">${project.title}</a>
                ${
                    project.extra
                    ? `<small><a href="${project.extra.link}">${project.extra.label}</a></small>`
                    : ''
                }
            </div>
        </div>
    `;
}

function loadSection(id, projects) {
    const container = document.getElementById(id);

    if (!projects || projects.length === 0) {
        container.innerHTML = `<div class="coming">Coming Soon</div>`;
        return;
    }

    container.innerHTML = projects.map(createCard).join('');
}

fetch("projects.json")
    .then(res => res.json())
    .then(data => {
        loadSection("pinned", data.pinned);
        loadSection("turbowarp", data.turbowarp);
        loadSection("penguinmod", data.penguinmod);
    })
    .catch(err => {
        console.error("Failed to load JSON:", err);
    });
</script>

</body>
</html>
